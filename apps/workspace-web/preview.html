<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Jam · 創作者後台 · 預覽 (dev harness)</title>

<!-- ============================================================
     PREVIEW HARNESS — dev/verification only, NOT part of the SPA.
     The real app boots from src/main.js via Vite (pnpm dev).
     This file loads the SAME .vue / .js source tree in-browser
     through vue3-sfc-loader so it can be previewed without a
     build step. The only differences from production are hash
     history (no dev server to handle deep links here) and that
     styles are <link>ed directly instead of imported by main.js.
     ============================================================ -->

<!-- design system stylesheets (base.css @imports the Google Fonts) -->
<link rel="stylesheet" href="src/styles/base.css">
<link rel="stylesheet" href="src/styles/workspace.css">

<script src="https://unpkg.com/vue@3.5.12/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-router@4.4.5/dist/vue-router.global.js"></script>
<script src="https://unpkg.com/vue-demi@0.14.10/lib/index.iife.js"></script>
<script src="https://unpkg.com/pinia@2.2.4/dist/pinia.iife.js"></script>
<script src="https://unpkg.com/naive-ui@2.40.1/dist/index.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader@0.9.5/dist/vue3-sfc-loader.js"></script>

<style>
  html, body { margin: 0; padding: 0; }
  #boot-status {
    position: fixed; inset: 0; display: grid; place-items: center;
    font-family: 'JetBrains Mono', ui-monospace, monospace; color: #5639d6; background: #e6e8f0;
    z-index: 9999; text-align: center; padding: 24px; line-height: 1.6;
  }
  #boot-status.err { color: #c0392b; white-space: pre-wrap; font-size: 13px; align-items: start; }
</style>
</head>
<body>
<div id="app"></div>
<div id="boot-status">載入 Vue SFC 中…</div>

<script>
(function () {
  const { loadModule } = window['vue3-sfc-loader'];
  const statusEl = document.getElementById('boot-status');
  const BARE = { vue: window.Vue, 'vue-router': window.VueRouter, pinia: window.Pinia, 'naive-ui': window.naive };

  const options = {
    moduleCache: { ...BARE },
    pathResolve({ refPath, relPath }) {
      if (relPath == null) return refPath;            // entry
      if (relPath in BARE) return relPath;            // bare module → moduleCache
      if (relPath.startsWith('@/')) return '/src/' + relPath.slice(2);
      if (relPath.startsWith('/')) return relPath;
      // relative
      const base = refPath.slice(0, refPath.lastIndexOf('/') + 1);
      const out = [];
      (base + relPath).split('/').forEach((seg) => {
        if (seg === '..') out.pop();
        else if (seg !== '.' && seg !== '') out.push(seg);
      });
      return '/' + out.join('/');
    },
    async getFile(url) {
      // Our imports omit extensions (e.g. '@/stores/dashboard', '@/data',
      // './icon-paths'). Try the explicit path, then '.js', then '/index.js'.
      const candidates = /\.(vue|js|mjs|css|json)$/.test(url)
        ? [url]
        : [url + '.js', url + '/index.js', url];
      let lastErr = 'HTTP 404 for ' + url;
      for (const u of candidates) {
        const res = await fetch(u.replace(/^\//, ''));
        if (!res.ok) { lastErr = 'HTTP ' + res.status + ' for ' + u; continue; }
        const source = await res.text();
        // Force ESM parsing for .js (loader treats bare .js as CommonJS otherwise).
        if (u.endsWith('.js') || u.endsWith('.mjs')) return { getContentData: () => source, type: '.mjs' };
        return source;
      }
      throw new Error(lastErr);
    },
    addStyle(textContent) {
      const style = document.createElement('style');
      style.textContent = textContent;
      document.head.appendChild(style);
    },
    log() { /* quiet */ },
  };

  const load = (p) => loadModule(p, options);

  async function boot() {
    const [
      App,
      OverviewView, ProductsView, UploadView, OrdersView,
      PurchasesView, WishlistView, SettingsView,
      JIcon, ProductThumb, Stars, TrendChart,
    ] = await Promise.all([
      load('/src/App.vue'),
      load('/src/views/OverviewView.vue'),
      load('/src/views/ProductsView.vue'),
      load('/src/views/UploadView.vue'),
      load('/src/views/OrdersView.vue'),
      load('/src/views/PurchasesView.vue'),
      load('/src/views/WishlistView.vue'),
      load('/src/views/SettingsView.vue'),
      load('/src/components/JIcon.vue'),
      load('/src/components/ProductThumb.vue'),
      load('/src/components/Stars.vue'),
      load('/src/components/TrendChart.vue'),
    ]);

    const { createApp, markRaw } = window.Vue;
    const { createPinia } = window.Pinia;
    const { createRouter, createWebHashHistory } = window.VueRouter;

    // Mirrors src/router/index.js — hash history here so deep links
    // work without a dev server. Production uses createWebHistory.
    const router = createRouter({
      history: createWebHashHistory(),
      routes: [
        { path: '/', name: 'overview', component: OverviewView, meta: { title: '儀表板' } },
        { path: '/products', name: 'products', component: ProductsView, meta: { title: '商品管理' } },
        { path: '/upload', name: 'upload', component: UploadView, meta: { title: '上架新作品' } },
        { path: '/orders', name: 'orders', component: OrdersView, meta: { title: '訂單管理' } },
        { path: '/purchases', name: 'purchases', component: PurchasesView, meta: { title: '購買紀錄' } },
        { path: '/wishlist', name: 'wishlist', component: WishlistView, meta: { title: 'Wishlist' } },
        { path: '/settings', name: 'settings', component: SettingsView, meta: { title: '設定' } },
        { path: '/:pathMatch(.*)*', redirect: '/' },
      ],
      scrollBehavior() { return { top: 0 }; },
    });

    const pinia = createPinia();
    // Mirrors the plugin in src/main.js — store actions navigate via this.router.
    pinia.use(({ store }) => { store.router = markRaw(router); });

    const app = createApp(App);
    app.use(pinia);
    app.use(router);
    app.use(window.naive);

    // global UI components (kebab tags used throughout the templates)
    app.component('j-icon', JIcon);
    app.component('product-thumb', ProductThumb);
    app.component('stars', Stars);
    app.component('trend-chart', TrendChart);

    await router.isReady();
    app.mount('#app');
    statusEl.remove();
  }

  boot().catch((err) => {
    statusEl.className = 'err';
    statusEl.textContent = '載入失敗：\n' + (err && err.stack ? err.stack : err);
    console.error(err);
  });
})();
</script>
</body>
</html>
