<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Open Jam · 創作者數位市集</title>
<style>
/* 全螢幕 splash — 靜態內聯於 index.html，bundle 下載期間即顯示；
   app 掛載＋字型就緒後由 src/utils/splash.ts 淡出移除。
   顏色對應 base.css token（此時尚未載入，需字面值）：
   --bg #fff9ec / --text #1a1a1a / --c-pink #ff90e8 / --c-pink-deep #d6479b
   / --c-yellow #ffde00 / --c-violet #8a5cf6 */
/* bundle 載入空窗期底色（base.css 尚未載入），避免白屏 */
html { background: #fff9ec; }
#oj-splash {
  position: fixed; inset: 0; z-index: 9999;
  background: #fff9ec;
  background-image: radial-gradient(rgba(26, 26, 26, 0.06) 1.5px, transparent 1.5px);
  background-size: 26px 26px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 26px; opacity: 1; transition: opacity .55s ease;
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  color: #1a1a1a; -webkit-font-smoothing: antialiased;
}
#oj-splash .jar { position: relative; animation: oj-splash-bob 2.6s ease-in-out infinite; }
#oj-splash .jar svg { display: block; overflow: visible; }
#oj-splash .brand {
  display: flex; align-items: center; gap: 9px;
  font-family: 'Space Grotesk', 'Noto Sans TC', -apple-system, sans-serif;
  font-weight: 900; font-size: 20px; letter-spacing: .5px;
}
#oj-splash .brand .jam { background: #ff90e8; border: 2px solid #1a1a1a; border-radius: 6px; padding: 0 8px; }
#oj-splash .hint { display: flex; align-items: center; gap: 7px; font-weight: 700; font-size: 14px; }
#oj-splash .dots { display: inline-flex; gap: 4px; }
#oj-splash .dots span {
  width: 6px; height: 6px; border-radius: 999px; background: #8a5cf6;
  animation: oj-splash-dot 1.2s ease-in-out infinite;
}
#oj-splash .dots span:nth-child(2) { animation-delay: .2s; }
#oj-splash .dots span:nth-child(3) { animation-delay: .4s; }
#oj-splash .anim-fill { animation: oj-splash-fill 1.9s ease-in-out infinite; }
#oj-splash .anim-wave { animation: oj-splash-wave 1.1s linear infinite; }
#oj-splash .anim-bubble { animation: oj-splash-bubble 2.1s ease-in infinite; }
#oj-splash .anim-bubble.b2 { animation-duration: 2.6s; animation-delay: .7s; }
#oj-splash .anim-bubble.b3 { animation-duration: 1.8s; animation-delay: 1.1s; }
@keyframes oj-splash-bob { 0%, 100% { transform: translateY(0) rotate(-1.5deg); } 50% { transform: translateY(-7px) rotate(1.5deg); } }
@keyframes oj-splash-fill { 0% { transform: translateY(70px); } 50% { transform: translateY(8px); } 100% { transform: translateY(70px); } }
@keyframes oj-splash-wave { 0% { transform: translateX(0); } 100% { transform: translateX(-24px); } }
@keyframes oj-splash-bubble { 0% { transform: translateY(0) scale(1); opacity: 0; } 20% { opacity: .9; } 100% { transform: translateY(-46px) scale(.4); opacity: 0; } }
@keyframes oj-splash-dot { 0%, 80%, 100% { opacity: .2; transform: translateY(0); } 40% { opacity: 1; transform: translateY(-5px); } }
@media (prefers-reduced-motion: reduce) {
  #oj-splash .jar, #oj-splash .dots span,
  #oj-splash .anim-fill, #oj-splash .anim-wave, #oj-splash .anim-bubble { animation: none; }
  #oj-splash .anim-fill { transform: translateY(8px); }
}
/* 本 session 已播過 → 延遲亮相：先隱形，450ms 後才淡入。
   載入夠快就整段看不到（不閃）；真的在等才出現 loading 圖 */
html.oj-splash-skip #oj-splash { opacity: 0; animation: oj-splash-late .3s ease 450ms forwards; }
@keyframes oj-splash-late { to { opacity: 1; } }
</style>
<script>
/* 同一分頁 session 只播一次 splash：之後的整頁載入在 first paint 前
   直接隱藏（splash.ts 讀同一 key 判斷淡出方式） */
try {
  if (sessionStorage.getItem('oj-splash-seen')) {
    document.documentElement.classList.add('oj-splash-skip');
  } else {
    sessionStorage.setItem('oj-splash-seen', '1');
  }
} catch (e) { /* 隱私模式禁 sessionStorage 時照常顯示 */ }
</script>
</head>
<body>
<div id="oj-splash" role="status" aria-label="載入中">
  <div class="jar">
    <svg width="132" height="168" viewBox="0 0 120 152">
      <defs>
        <clipPath id="oj-splash-jar-inner"><rect x="26" y="49" width="68" height="82" rx="14"/></clipPath>
      </defs>
      <ellipse cx="60" cy="145" rx="38" ry="6" fill="rgba(26,26,26,0.12)"/>
      <rect x="22" y="45" width="76" height="90" rx="18" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
      <g clip-path="url(#oj-splash-jar-inner)">
        <g class="anim-fill">
          <rect x="18" y="70" width="84" height="90" fill="#ff90e8"/>
          <g class="anim-wave">
            <path d="M12 72 q6 -7 12 0 t12 0 t12 0 t12 0 t12 0 t12 0 v40 h-84 z" fill="#ff90e8"/>
            <path d="M12 72 q6 -7 12 0 t12 0 t12 0 t12 0 t12 0 t12 0" fill="none" stroke="#d6479b" stroke-width="2.4"/>
          </g>
          <circle class="anim-bubble" cx="44" cy="104" r="3" fill="#ffffff" opacity="0.5"/>
          <circle class="anim-bubble b2" cx="70" cy="110" r="2.4" fill="#ffffff" opacity="0.5"/>
          <circle class="anim-bubble b3" cx="58" cy="116" r="2" fill="#ffffff" opacity="0.5"/>
        </g>
      </g>
      <rect x="36" y="92" width="48" height="26" rx="7" fill="#ffffff" stroke="#1a1a1a" stroke-width="2.5"/>
      <text x="60" y="110" text-anchor="middle" font-family="'Space Grotesk','Noto Sans TC',sans-serif" font-weight="700" font-size="16" fill="#1a1a1a">OJ</text>
      <rect x="30" y="34" width="60" height="14" rx="5" fill="#d6479b" stroke="#1a1a1a" stroke-width="2.5"/>
      <rect x="26" y="20" width="68" height="18" rx="7" fill="#ffde00" stroke="#1a1a1a" stroke-width="3"/>
    </svg>
  </div>
  <div class="brand"><span>OPEN</span><span class="jam">JAM</span></div>
  <div class="hint">
    <span>正在準備你的數位市集</span>
    <span class="dots"><span></span><span></span><span></span></span>
  </div>
</div>
<div id="app"></div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
