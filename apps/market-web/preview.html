<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Jam · 預覽 (dev harness)</title>

<!-- ============================================================
     PREVIEW HARNESS — dev/verification only, NOT part of the SPA.
     The real app boots from src/main.js via Vite (pnpm dev).
     This file loads the SAME .vue / .js source tree in-browser
     through vue3-sfc-loader so it can be previewed without a
     build step. The only difference from production is hash
     history (no dev server to handle deep links here).
     ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Unbounded:wght@400..800&family=Noto+Sans+TC:wght@400..800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="src/assets/css/base.css">
<link rel="stylesheet" href="src/assets/css/market.css">

<script src="https://unpkg.com/vue@3.5.12/dist/vue.global.js"></script>
<script src="https://unpkg.com/vue-router@4.4.5/dist/vue-router.global.js"></script>
<script src="https://unpkg.com/vue-demi@0.14.10/lib/index.iife.js"></script>
<script src="https://unpkg.com/pinia@2.2.4/dist/pinia.iife.js"></script>
<script src="https://unpkg.com/naive-ui@2.40.1/dist/index.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue3-sfc-loader@0.9.5/dist/vue3-sfc-loader.js"></script>

<style>
  html, body { margin: 0; padding: 0; }
  #boot-status {
    position: fixed; inset: 0; display: grid; place-items: center;
    font-family: 'Space Mono', monospace; color: #6151f0; background: #faf7f2;
    z-index: 9999; text-align: center; padding: 24px; line-height: 1.6;
  }
  #boot-status.err { color: #c0392b; white-space: pre-wrap; font-size: 13px; align-items: start; }
</style>
</head>
<body>
<div id="app"></div>
<div id="boot-status">載入 Vue SFC 中…</div>

<script>
(function () {
  const { loadModule } = window['vue3-sfc-loader'];
  const statusEl = document.getElementById('boot-status');
  const BARE = { vue: window.Vue, 'vue-router': window.VueRouter, pinia: window.Pinia, 'naive-ui': window.naive };

  const options = {
    moduleCache: { ...BARE },
    pathResolve({ refPath, relPath }) {
      if (relPath == null) return refPath;            // entry
      if (relPath in BARE) return relPath;            // bare module → moduleCache
      if (relPath.startsWith('@/')) return '/src/' + relPath.slice(2);
      if (relPath.startsWith('/')) return relPath;
      // relative
      const base = refPath.slice(0, refPath.lastIndexOf('/') + 1);
      const out = [];
      (base + relPath).split('/').forEach((seg) => {
        if (seg === '..') out.pop();
        else if (seg !== '.' && seg !== '') out.push(seg);
      });
      return '/' + out.join('/');
    },
    async getFile(url) {
      const res = await fetch(url.replace(/^\//, ''));
      if (!res.ok) throw new Error('HTTP ' + res.status + ' for ' + url);
      const source = await res.text();
      // Force ESM parsing for .js (loader treats bare .js as CommonJS otherwise).
      if (url.endsWith('.js')) return { getContentData: () => source, type: '.mjs' };
      return source;
    },
    addStyle(textContent) {
      const style = document.createElement('style');
      style.textContent = textContent;
      document.head.appendChild(style);
    },
    log(type, ...args) { /* quiet */ },
  };

  const load = (p) => loadModule(p, options);

  async function boot() {
    const [App, MarketView, ShopLayout, ListView, DetailView, CheckoutView,
      JIcon, Stars, ProductThumb, ProductCard, MktCard] = await Promise.all([
      load('/src/App.vue'),
      load('/src/views/MarketView.vue'),
      load('/src/layouts/ShopLayout.vue'),
      load('/src/views/ListView.vue'),
      load('/src/views/DetailView.vue'),
      load('/src/views/CheckoutView.vue'),
      load('/src/components/JIcon.vue'),
      load('/src/components/Stars.vue'),
      load('/src/components/ProductThumb.vue'),
      load('/src/components/ProductCard.vue'),
      load('/src/components/MktCard.vue'),
    ]);

    const { createApp } = window.Vue;
    const { createPinia } = window.Pinia;
    const { createRouter, createWebHashHistory } = window.VueRouter;

    // Mirrors src/router/index.js — hash history here so deep links
    // work without a dev server. Production uses createWebHistory.
    const router = createRouter({
      history: createWebHashHistory(),
      routes: [
        { path: '/', name: 'market', component: MarketView },
        {
          path: '/shop', component: ShopLayout, children: [
            { path: '', name: 'shop-list', component: ListView },
            { path: 'product/:id', name: 'product', component: DetailView, props: true },
            { path: 'checkout', name: 'checkout', component: CheckoutView },
          ],
        },
        { path: '/:pathMatch(.*)*', redirect: '/' },
      ],
      scrollBehavior(to, from, saved) {
        if (saved) return saved;
        if (to.hash) return { el: to.hash };
        return { top: 0 };
      },
    });

    const app = createApp(App);
    app.use(createPinia());
    app.use(router);
    app.use(window.naive);
    app.component('JIcon', JIcon);
    app.component('Stars', Stars);
    app.component('ProductThumb', ProductThumb);
    app.component('ProductCard', ProductCard);
    app.component('MktCard', MktCard);

    await router.isReady();
    app.mount('#app');
    statusEl.remove();
  }

  boot().catch((err) => {
    statusEl.className = 'err';
    statusEl.textContent = '載入失敗：\n' + (err && err.stack ? err.stack : err);
    console.error(err);
  });
})();
</script>
</body>
</html>
