nameOverride: ""
fullnameOverride: ""

# ── 全域 URL 設定 ─────────────────────────────────────────────────────────────
config:
  externalUrl: "https://openjam.co/"
  hydraPublicUrl: "https://hydra.openjam.co/"
  authPageUrl: "https://auth.openjam.co/"
  portalPageUrl: "https://openjam.co/"
  workspaceUrl: "https://workspace.openjam.co/"
  creatorBaseUrl: "https://<store-slug>.openjam.co"
  storeApiUrl: "https://api.openjam.co/store-service"
  oidcClientId: "open-jam-web"
  # 指向 GCS 公開 bucket（assets.openjam.co 尚無 CDN／bucket backend，指過去會全數 404）
  storagePublicBaseUrl: "https://storage.googleapis.com/open-jam-public"

# 資料庫名稱前綴（對應 docker-compose 的 DB_NAME_PREFIX）
dbNamePrefix: open_jam

# ── Secrets ───────────────────────────────────────────────────────────────────
# 真實機密不放本檔（本檔進 git）：本地部署疊 values.prod.secrets.yaml（gitignored，
# 唯一真相在 GCP Secret Manager 的 open-jam-helm-secrets），CI 部署時以 gcloud
# 取出疊上（見 release.yml deploy job）。
secrets:
  # postgres.password / redis.password / rabbitmq.password /
  # hydra.systemSecret / hydra.pairwiseSalt / sendgrid.apiKey → 機密 overlay
  smtp:
    username: ""
    password: ""
  storage:
    # Provider 為 Gcs 時不使用，僅供 Minio 切換時參考
    accessKey: ""
    secretKey: ""

# ── Hydra OIDC Clients（Web redirectUris 沿用 base values）──────────────────────
hydraClients:
  service:
    clientId: "open-jam-service"
    # clientSecret → 機密 overlay

# ── Infrastructure ────────────────────────────────────────────────────────────

postgres:
  enabled: true
  image: postgres:16-alpine
  user: postgres
  persistence:
    enabled: true
    storageClass: "standard-rwo"
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

redis:
  enabled: true
  image: redis:7-alpine
  persistence:
    enabled: true
    storageClass: "standard-rwo"
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

rabbitmq:
  enabled: true
  image: rabbitmq:3.13-management-alpine
  user: guest
  virtualHost: /
  persistence:
    enabled: true
    storageClass: "standard-rwo"
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

hydra:
  enabled: true
  image: oryd/hydra:v2.2
  dev: false
  migrateJob:
    enabled: true
    ttlSecondsAfterFinished: 300
    backoffLimit: 10
  # GCLB / GFE 的來源 IP range，用於 SERVE_TLS_ALLOW_TERMINATION_FROM
  tlsTerminationFrom: "130.211.0.0/22,35.191.0.0/16"
  ttl:
    authCode: "10m"
    loginConsentRequest: "10m"
  oidc:
    subjectIdentifiers: "pairwise,public"
  cors:
    # 創作者店面為 <slug>.openjam.co 動態子網域，需以萬用樣式放行（Ory Hydra 採 rs/cors，支援 https://*.openjam.co）
    allowedOrigins: "https://workspace.openjam.co,https://openjam.co,https://*.openjam.co,http://localhost:5173,http://localhost:5174,http://localhost:5175"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Mailpit：本地 / Staging 用；Production 請設 enabled: false 並配置外部 SMTP
mailpit:
  enabled: false
  image: axllent/mailpit:latest
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

smtp:
  # 若 mailpit.enabled=true 則以下設定自動被 mailpit service 覆蓋
  host: ""
  port: 1025
  enableSsl: false
  fromAddress: "noreply@openjam.co"

sendgrid:
  fromAddress: "noreply@openjam.co"

email:
  maxRetryAttempts: 5
  retryIntervalMinutes: 2

# 檔案儲存後端：正式環境採用 GCS，signed URL 透過 GKE Workload Identity 簽章
storage:
  provider: Gcs
  # 公開讀取資產（Avatar/Banner、商品縮圖，public/* 前綴）所屬 bucket
  publicBucket: open-jam-public
  # 私有資產（買家授權下載的版本檔）所屬 bucket
  privateBucket: open-jam-private
  softDeleteRetentionDays: 30
  gcs:
    # 留空走 ADC / GKE Workload Identity
    credentialsPath: ""

