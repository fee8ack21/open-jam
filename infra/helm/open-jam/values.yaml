# ── One-time Seed Job ─────────────────────────────────────────────────────────

bootstrap:
  enabled: true
  image:
    repository: open-jam/bootstrap
    tag: latest
    pullPolicy: IfNotPresent
  ttlSecondsAfterFinished: 300
  # seed 平台管理員（password 留空則跳過；正式環境請以 --set 覆蓋）
  adminUser:
    email: "admin@openjam.co"
    password: ""
  # 是否 seed 假帳號 / 假店家（僅供非正式環境，正式請維持 false）
  seedMockData: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
