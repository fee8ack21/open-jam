# ── 監控告警 ──────────────────────────────────────────────────────────────────
# kwatch：叢集內 pod / node 異常偵測（CrashLoopBackOff / OOM / probe 失敗 /
# PVC 空間不足等）直接發 Discord webhook。外部視角（網站掛了）另由 GCP
# Cloud Monitoring uptime check 負責（見 infra/gcp/monitoring/）。
kwatch:
  enabled: false
  image: ghcr.io/abahmed/kwatch:v0.10.5
  alertTitle: "Open Jam 叢集告警"
  maxRecentLogLines: 30
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

# ── One-time Seed Job ─────────────────────────────────────────────────────────

bootstrap:
  enabled: true
  image:
    repository: open-jam/bootstrap
    tag: latest
    pullPolicy: IfNotPresent
  ttlSecondsAfterFinished: 300
  # seed 平台管理員（password 留空則跳過；正式環境請以 --set 覆蓋）
  adminUser:
    email: "admin@openjam.co"
    password: ""
  # 是否 seed 假帳號 / 假店家（僅供非正式環境，正式請維持 false）
  seedMockData: false
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi
