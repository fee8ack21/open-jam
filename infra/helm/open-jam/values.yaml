nameOverride: ""
fullnameOverride: ""

# ── 全域 URL 設定 ─────────────────────────────────────────────────────────────
config:
  externalUrl: "https://openjam.co/"
  hydraPublicUrl: "https://hydra.openjam.co/"
  authPageUrl: "https://auth.openjam.co/"
  workspaceUrl: "https://workspace.openjam.co/"
  creatorBaseUrl: "http://localhost:5174"
  storeApiUrl: "https://api.openjam.co/store-service"
  oidcClientId: "open-jam-web"
  storagePublicBaseUrl: "https://assets.openjam.co"

# 資料庫名稱前綴（對應 docker-compose 的 DB_NAME_PREFIX）
dbNamePrefix: open_jam

# ── Secrets（敏感值請由 --set 或外部 Secret Manager 覆蓋）─────────────────────
secrets:
  postgres:
    password: "changeme"
  redis:
    password: "changeme"
  rabbitmq:
    password: "changeme"
  hydra:
    systemSecret: "changeme-at-least-32-chars-long!!"
    pairwiseSalt: "changeme-pairwise-salt"
  smtp:
    username: ""
    password: ""
  sendgrid:
    apiKey: ""
  storage:
    accessKey: "minioadmin"
    secretKey: "minioadmin"

# ── Infrastructure ────────────────────────────────────────────────────────────

postgres:
  enabled: true
  image: postgres:16-alpine
  user: postgres
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

redis:
  enabled: true
  image: redis:7-alpine
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

rabbitmq:
  enabled: true
  image: rabbitmq:3.13-management-alpine
  user: guest
  virtualHost: /
  persistence:
    enabled: true
    storageClass: ""
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

hydra:
  enabled: true
  image: oryd/hydra:v2.2
  dev: true
  migrateJob:
    enabled: true
    ttlSecondsAfterFinished: 300
    backoffLimit: 10
  ttl:
    authCode: "10m"
    loginConsentRequest: "10m"
  oidc:
    subjectIdentifiers: "pairwise,public"
  cors:
    allowedOrigins: "*"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Mailpit：本地 / Staging 用；Production 請設 enabled: false 並配置外部 SMTP
mailpit:
  enabled: true
  image: axllent/mailpit:latest
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

smtp:
  # 若 mailpit.enabled=true 則以下設定自動被 mailpit service 覆蓋
  host: ""
  port: 1025
  enableSsl: false
  fromAddress: "noreply@openjam.co"

sendgrid:
  fromAddress: "noreply@openjam.co"

email:
  maxRetryAttempts: 5
  retryIntervalMinutes: 2

# 檔案儲存後端：地端 MinIO（S3 相容）或雲端 GCS，依 Provider 切換
storage:
  provider: Minio
  endpoint: "minio:9000"
  useSsl: false
  bucket: open-jam
  softDeleteRetentionDays: 30
  gcs:
    # 留空走 ADC / GKE Workload Identity
    credentialsPath: ""

