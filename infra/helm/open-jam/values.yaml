nameOverride: ""
fullnameOverride: ""

# ── 全域 URL 設定 ─────────────────────────────────────────────────────────────
config:
  externalUrl: "https://openjam.co/"
  hydraPublicUrl: "https://hydra.openjam.co/"
  authPageUrl: "https://auth.openjam.co/"
  portalPageUrl: "https://openjam.co/"
  workspaceUrl: "https://workspace.openjam.co/"
  creatorBaseUrl: "https://<store-slug>.openjam.co"
  authApiUrl: "https://api.openjam.co/auth-service"
  storeApiUrl: "https://api.openjam.co/store-service"
  catalogApiUrl: "https://api.openjam.co/catalog-service"
  logApiUrl: "https://api.openjam.co/log-service"
  contentApiUrl: "https://api.openjam.co/content-service"
  orderApiUrl: "https://api.openjam.co/order-service"
  storageApiUrl: "https://api.openjam.co/storage-service"
  notificationApiUrl: "https://api.openjam.co/notification-service"
  paymentApiUrl: "https://api.openjam.co/payment-service"
  githubRepoUrl: "https://github.com/fee8ack21/open-jam"
  docsUrl: "https://docs.openjam.co"
  oidcClientId: "open-jam-web"
  # 公開資產（Avatar / Banner / 商品縮圖，IsPublic 物件）對外讀取網址前綴。
  # 必須指向真正提供 bucket 物件的來源：MVP 直接用 GCS 公開網址；未來若上 Cloud CDN
  # 再換成 assets.openjam.co（需先替該網域建好 CDN／bucket backend，否則資產全數 404）。
  storagePublicBaseUrl: "https://storage.googleapis.com/open-jam-public"

hydraClients:
  web:
    redirectUris:
      - "http://localhost:5173/callback.html"
      - "http://localhost:5173/silent-renew.html"
      - "http://localhost:5174/callback.html"
      - "http://localhost:5174/silent-renew.html"
      - "http://localhost:5175/callback.html"
      - "http://localhost:5175/silent-renew.html"
      - "https://workspace.openjam.co/callback.html"
      - "https://workspace.openjam.co/silent-renew.html"
      - "https://openjam.co/callback.html"
      - "https://openjam.co/silent-renew.html"
    postLogoutRedirectUris:
      - "http://localhost:5173/"
      - "http://localhost:5174/"
      - "http://localhost:5175/"
      - "https://workspace.openjam.co/"
      - "https://openjam.co/"
  # client_credentials 服務帳號（clientSecret 正式環境請以 --set 覆蓋）
  service:
    clientId: "open-jam-service"
    clientSecret: "changeme-service-client-secret"

# 資料庫名稱前綴（對應 docker-compose 的 DB_NAME_PREFIX）
dbNamePrefix: open_jam

# ── Secrets（敏感值請由 --set 或外部 Secret Manager 覆蓋）─────────────────────
secrets:
  postgres:
    password: "changeme"
  redis:
    password: "changeme"
  rabbitmq:
    password: "changeme"
  hydra:
    systemSecret: "changeme-at-least-32-chars-long!!"
    pairwiseSalt: "changeme-pairwise-salt"
  smtp:
    username: ""
    password: ""
  sendgrid:
    apiKey: ""
  storage:
    # 本地檔案後端的 HMAC blob 簽章密鑰（僅 storage.provider=Local 時使用）
    localSigningKey: "changeme-local-storage-signing-key"
  discord:
    # 告警頻道 webhook URL（kwatch pod 異常告警用；kwatch.enabled=true 時必填）
    webhookUrl: ""

# ── Infrastructure ────────────────────────────────────────────────────────────

postgres:
  enabled: true
  image: postgres:16-alpine
  user: postgres
  persistence:
    enabled: true
    storageClass: ""
    size: 10Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

redis:
  enabled: true
  image: redis:7-alpine
  persistence:
    enabled: true
    storageClass: ""
    size: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

rabbitmq:
  enabled: true
  image: rabbitmq:3.13-management-alpine
  user: guest
  virtualHost: /
  persistence:
    enabled: true
    storageClass: ""
    size: 2Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

hydra:
  enabled: true
  image: oryd/hydra:v2.2
  dev: true
  migrateJob:
    enabled: true
    ttlSecondsAfterFinished: 300
    backoffLimit: 10
  ttl:
    authCode: "10m"
    loginConsentRequest: "10m"
  oidc:
    subjectIdentifiers: "pairwise,public"
  cors:
    allowedOrigins: "*"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Mailpit：本地 / Staging 用；Production 請設 enabled: false 並配置外部 SMTP
mailpit:
  enabled: true
  image: axllent/mailpit:latest
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

smtp:
  # 若 mailpit.enabled=true 則以下設定自動被 mailpit service 覆蓋
  host: ""
  port: 1025
  enableSsl: false
  fromAddress: "noreply@openjam.co"

sendgrid:
  fromAddress: "noreply@openjam.co"

email:
  maxRetryAttempts: 5
  retryIntervalMinutes: 2

# 檔案儲存後端：雲端 GCS（預設）或本地檔案系統，依 Provider 切換
storage:
  provider: Gcs
  # 公開讀取資產（Avatar/Banner、商品縮圖，IsPublic 物件）所屬 bucket
  publicBucket: open-jam-public
  # 私有資產（買家授權下載的版本檔）所屬 bucket
  privateBucket: open-jam-private
  softDeleteRetentionDays: 30
  gcs:
    # GKE Workload Identity：storage-service pod 以下列 GSA 身分存取 GCS（免服務帳戶金鑰），
    # signed URL 經 IAM SignBlob API 簽章。Provider 為 Gcs 時必填；chart 會建立專屬 KSA
    # 並加上 iam.gke.io/gcp-service-account annotation，GSA 端 IAM 綁定須先以 gcloud 完成
    #（workloadIdentityUser / serviceAccountTokenCreator / bucket 權限，見 docs/infra.md）。
    gcpServiceAccount: ""
  local:
    # 檔案存放根目錄（相對工作目錄）；正式建議掛載 PersistentVolume
    rootPath: Files
    # 本服務對外可達 base URL，用於組合 blob 上傳 / 下載 URL（Provider=Local 時必填）
    baseUrl: ""

