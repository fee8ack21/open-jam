{{- if .Values.marketWeb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-jam.fullname" . }}-market-web
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: market-web
spec:
  replicas: {{ .Values.marketWeb.replicaCount }}
  selector:
    matchLabels:
      {{- include "open-jam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: market-web
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: market-web
    spec:
      containers:
        - name: market-web
          image: {{ printf "%s:%s" .Values.marketWeb.image.repository .Values.marketWeb.image.tag | quote }}
          imagePullPolicy: {{ .Values.marketWeb.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          env:
            - name: WORKSPACE_URL
              value: {{ .Values.config.workspaceUrl | quote }}
            - name: CREATOR_BASE_URL
              value: {{ .Values.config.creatorBaseUrl | quote }}
            - name: HYDRA_PUBLIC_URL
              value: {{ include "open-jam.hydraPublicUrl" . | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.config.oidcClientId | quote }}
            - name: AUTH_PAGE_URL
              value: {{ .Values.config.authPageUrl | quote }}
          {{- with .Values.marketWeb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
{{- end }}
