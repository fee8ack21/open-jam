{{- if .Values.rabbitmq.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "open-jam.fullname" . }}-rabbitmq-conf
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: rabbitmq
data:
  # 降低 RabbitMQ console log 等級以減少雲端 log 費用；
  # RabbitMQ image 不支援以環境變數設定 log level，需透過 rabbitmq.conf
  rabbitmq.conf: |
    log.console.level = warning
{{- end }}
