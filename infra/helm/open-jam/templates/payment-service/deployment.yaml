{{- if .Values.paymentService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-jam.fullname" . }}-payment-service
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: payment-service
spec:
  replicas: {{ .Values.paymentService.replicaCount }}
  selector:
    matchLabels:
      {{- include "open-jam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: payment-service
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: payment-service
    spec:
      containers:
        - name: payment-service
          image: {{ printf "%s:%s" .Values.paymentService.image.repository .Values.paymentService.image.tag | quote }}
          imagePullPolicy: {{ .Values.paymentService.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: PathBase
              value: "/payment-service"
            - name: Logging__LogLevel__Default
              value: "Warning"
            - name: Logging__LogLevel__Microsoft
              value: "Warning"
            - name: Logging__LogLevel__Microsoft.Hosting.Lifetime
              value: "Warning"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: payment-service-connection-string
            - name: RabbitMQ__Host
              value: {{ include "open-jam.rabbitmqHost" . | quote }}
            - name: RabbitMQ__Username
              value: {{ .Values.rabbitmq.user | quote }}
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: rabbitmq-password
            - name: Stripe__SecretKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: payment-stripe-secret-key
            - name: Stripe__PublishableKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: payment-stripe-publishable-key
            - name: Stripe__WebhookSecret
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: payment-stripe-webhook-secret
            - name: Stripe__ConnectWebhookSecret
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: payment-stripe-connect-webhook-secret
            - name: Stripe__PlatformFeePercent
              value: {{ .Values.paymentService.stripe.platformFeePercent | quote }}
            - name: Stripe__PlatformFeeFixed
              value: {{ .Values.paymentService.stripe.platformFeeFixed | quote }}
            - name: Stripe__SuccessUrl
              value: {{ .Values.paymentService.stripe.successUrl | quote }}
            - name: Stripe__CancelUrl
              value: {{ .Values.paymentService.stripe.cancelUrl | quote }}
            - name: Stripe__ConnectRefreshUrl
              value: {{ .Values.paymentService.stripe.connectRefreshUrl | quote }}
            - name: Stripe__ConnectReturnUrl
              value: {{ .Values.paymentService.stripe.connectReturnUrl | quote }}
            - name: Services__StoreService__BaseUrl
              value: {{ include "open-jam.storeServiceUrl" . | quote }}
            - name: ServiceAuth__ClientId
              value: {{ .Values.hydraClients.service.clientId | quote }}
            - name: Hydra__Issuer
              value: {{ include "open-jam.hydraPublicUrl" . | quote }}
            - name: Hydra__MetadataAddress
              value: {{ include "open-jam.hydraMetadataAddress" . | quote }}
          {{- with .Values.paymentService.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh"]
          args:
            - -c
            - >
              /wait-for-it.sh {{ include "open-jam.postgresHost" . }}:5432 --timeout=60 --strict &&
              /wait-for-it.sh {{ include "open-jam.rabbitmqHost" . }}:5672 --timeout=60 --strict &&
              dotnet PaymentService.dll
          volumeMounts:
            - name: wait-for-it
              mountPath: /wait-for-it.sh
              subPath: wait-for-it.sh
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: wait-for-it
          configMap:
            name: {{ include "open-jam.fullname" . }}-wait-for-it
            defaultMode: 0755
{{- end }}
