{{- if .Values.kwatch.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "open-jam.fullname" . }}-kwatch
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: kwatch
---
# kwatch 需讀取叢集層級資源（nodes / 事件 / pod logs）偵測異常，
# 權限清單取自 upstream deploy/deploy.yaml（v0.10.5）
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "open-jam.fullname" . }}-kwatch
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: kwatch
rules:
  - apiGroups: [""]
    resources: ["events", "nodes", "nodes/proxy", "pods", "pods/log", "persistentvolumeclaims", "configmaps"]
    verbs: ["get", "watch", "list", "create", "update"]
  - apiGroups: ["apps"]
    resources: ["daemonsets", "statefulsets", "deployments", "replicasets"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "open-jam.fullname" . }}-kwatch
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: kwatch
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "open-jam.fullname" . }}-kwatch
subjects:
  - kind: ServiceAccount
    name: {{ include "open-jam.fullname" . }}-kwatch
    namespace: {{ .Release.Namespace }}
{{- end }}
