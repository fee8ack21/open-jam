{{- if .Values.kwatch.enabled }}
# kwatch 設定檔含 Discord webhook URL（可對頻道發言的機密），故以 Secret 而非 ConfigMap 掛載
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-jam.fullname" . }}-kwatch-config
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: kwatch
type: Opaque
stringData:
  config.yaml: |
    maxRecentLogLines: {{ .Values.kwatch.maxRecentLogLines }}
    ignoreFailedGracefulShutdown: true
    healthCheck:
      enabled: true
      port: 8060
    alert:
      discord:
        webhook: {{ required "kwatch.enabled=true 時必須提供 secrets.discord.webhookUrl（機密 overlay）" .Values.secrets.discord.webhookUrl | quote }}
        title: {{ .Values.kwatch.alertTitle | quote }}
    namespaces:
      - {{ .Release.Namespace }}
{{- end }}
