{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "open-jam.fullname" . }}-bootstrap
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    # post-upgrade 亦掛載：seeder 皆冪等，每次升級重跑使 Hydra service client secret
    # 等靜態設定收斂到目前 helm 值（HydraClientSeeder force-update PUT），避免密鑰漂移致
    # 服務間換 token 回 401。僅 post-install 時升級不會重跑、修正永不生效。
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: {{ .Values.bootstrap.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: {{ printf "%s:%s" .Values.bootstrap.image.repository .Values.bootstrap.image.tag | quote }}
          imagePullPolicy: {{ .Values.bootstrap.image.pullPolicy }}
          env:
            - name: ConnectionStrings__EmailConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: email-service-connection-string
            - name: ConnectionStrings__AuthConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: auth-connection-string
            - name: ConnectionStrings__CatalogConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: catalog-service-connection-string
            - name: ConnectionStrings__StoreConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: store-service-connection-string
            - name: ConnectionStrings__NotificationConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: notification-service-connection-string
            - name: ConnectionStrings__OrderConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: order-service-connection-string
            - name: ConnectionStrings__ContentConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: content-service-connection-string
            - name: Hydra__AdminUrl
              value: {{ include "open-jam.hydraAdminUrl" . | quote }}
            - name: AdminUser__Email
              value: {{ .Values.bootstrap.adminUser.email | quote }}
            - name: AdminUser__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: admin-user-password
            - name: MockUsers__Enabled
              value: {{ .Values.bootstrap.seedMockData | quote }}
            - name: MockStores__Enabled
              value: {{ .Values.bootstrap.seedMockData | quote }}
            - name: HydraClients__Service__ClientId
              value: {{ .Values.hydraClients.service.clientId | quote }}
            - name: HydraClients__Service__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: hydra-service-client-secret
            {{- range $index, $uri := .Values.hydraClients.web.redirectUris }}
            - name: HydraClients__Web__RedirectUris__{{ $index }}
              value: {{ $uri | quote }}
            {{- end }}
            {{- range $index, $uri := .Values.hydraClients.web.postLogoutRedirectUris }}
            - name: HydraClients__Web__PostLogoutRedirectUris__{{ $index }}
              value: {{ $uri | quote }}
            {{- end }}
          {{- with .Values.bootstrap.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
