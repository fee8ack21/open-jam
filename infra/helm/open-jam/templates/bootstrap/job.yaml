{{- if .Values.bootstrap.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "open-jam.fullname" . }}-bootstrap
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: bootstrap
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  ttlSecondsAfterFinished: {{ .Values.bootstrap.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      containers:
        - name: bootstrap
          image: {{ printf "%s:%s" .Values.bootstrap.image.repository .Values.bootstrap.image.tag | quote }}
          imagePullPolicy: {{ .Values.bootstrap.image.pullPolicy }}
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: email-service-connection-string
            - name: Hydra__AdminUrl
              value: {{ include "open-jam.hydraAdminUrl" . | quote }}
            - name: HydraClients__Web__RedirectUris__0
              value: {{ printf "%scallback.html" .Values.config.externalUrl | quote }}
            - name: HydraClients__Web__RedirectUris__1
              value: {{ printf "%ssilent-renew.html" .Values.config.externalUrl | quote }}
            - name: HydraClients__Web__RedirectUris__2
              value: "http://workspace.openjam.co"
            - name: HydraClients__Web__RedirectUris__3
              value: "https://openjam.co"
            - name: HydraClients__Web__PostLogoutRedirectUris__0
              value: {{ .Values.config.externalUrl | quote }}
            - name: HydraClients__Web__PostLogoutRedirectUris__1
              value: {{ .Values.config.workspaceUrl | quote }}
            - name: HydraClients__Web__PostLogoutRedirectUris__2
              value: "http://workspace.openjam.co"
            - name: HydraClients__Web__PostLogoutRedirectUris__3
              value: "https://openjam.co"
          {{- with .Values.bootstrap.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
