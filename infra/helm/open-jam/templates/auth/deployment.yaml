{{- if .Values.auth.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-jam.fullname" . }}-auth
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
spec:
  replicas: {{ .Values.auth.replicaCount }}
  selector:
    matchLabels:
      {{- include "open-jam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: auth
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: auth
    spec:
      containers:
        - name: auth
          image: {{ printf "%s:%s" .Values.auth.image.repository .Values.auth.image.tag | quote }}
          imagePullPolicy: {{ .Values.auth.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: Logging__LogLevel__Default
              value: "Warning"
            - name: Logging__LogLevel__Microsoft
              value: "Warning"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: auth-connection-string
            - name: RabbitMQ__Host
              value: {{ include "open-jam.rabbitmqHost" . | quote }}
            - name: RabbitMQ__Username
              value: {{ .Values.rabbitmq.user | quote }}
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: rabbitmq-password
            - name: Hydra__AdminUrl
              value: {{ include "open-jam.hydraAdminUrl" . | quote }}
            - name: App__BaseUrl
              value: {{ .Values.config.authPageUrl | quote }}
            - name: App__WorkspaceUrl
              value: {{ .Values.config.workspaceUrl | quote }}
          {{- with .Values.auth.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh"]
          args:
            - -c
            - >
              /wait-for-it.sh {{ include "open-jam.postgresHost" . }}:5432 --timeout=60 --strict &&
              /wait-for-it.sh {{ include "open-jam.rabbitmqHost" . }}:5672 --timeout=60 --strict &&
              dotnet Auth.dll
          volumeMounts:
            - name: wait-for-it
              mountPath: /wait-for-it.sh
              subPath: wait-for-it.sh
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: wait-for-it
          configMap:
            name: {{ include "open-jam.fullname" . }}-wait-for-it
            defaultMode: 0755
{{- end }}
