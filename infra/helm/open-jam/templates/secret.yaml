apiVersion: v1
kind: Secret
metadata:
  name: {{ include "open-jam.secretName" . }}
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.secrets.postgres.password | quote }}
  redis-password: {{ .Values.secrets.redis.password | quote }}
  rabbitmq-password: {{ .Values.secrets.rabbitmq.password | quote }}
  hydra-system-secret: {{ .Values.secrets.hydra.systemSecret | quote }}
  hydra-pairwise-salt: {{ .Values.secrets.hydra.pairwiseSalt | quote }}
  hydra-service-client-secret: {{ .Values.hydraClients.service.clientSecret | quote }}
  # Bootstrap seed 用管理員密碼（留空則跳過 admin seed）
  admin-user-password: {{ .Values.bootstrap.adminUser.password | quote }}
  # 完整 connection strings，直接注入 ASP.NET Core 環境變數
  auth-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_auth;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  log-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_log;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  email-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_email;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  storage-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_storage;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  store-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_store;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  catalog-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_catalog;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  quota-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_quota;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  payment-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_payment;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  order-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_order;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  notification-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_notification;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  content-service-connection-string: {{ printf "Host=%s;Port=5432;Database=%s_content;Username=%s;Password=%s" (include "open-jam.postgresHost" .) .Values.dbNamePrefix .Values.postgres.user .Values.secrets.postgres.password | quote }}
  # Hydra DSN（libpq URL 格式）
  hydra-dsn: {{ printf "postgres://%s:%s@%s:5432/%s_hydra" .Values.postgres.user .Values.secrets.postgres.password (include "open-jam.postgresHost" .) .Values.dbNamePrefix | quote }}
  # Cloudflare Turnstile siteverify secret（Auth 認證表單人機驗證）
  auth-turnstile-secret-key: {{ .Values.auth.turnstile.secretKey | quote }}
  smtp-username: {{ .Values.secrets.smtp.username | quote }}
  smtp-password: {{ .Values.secrets.smtp.password | quote }}
  sendgrid-api-key: {{ .Values.secrets.sendgrid.apiKey | quote }}
  storage-local-signing-key: {{ .Values.secrets.storage.localSigningKey | quote }}
  payment-stripe-secret-key: {{ .Values.paymentService.stripe.secretKey | quote }}
  payment-stripe-publishable-key: {{ .Values.paymentService.stripe.publishableKey | quote }}
  payment-stripe-webhook-secret: {{ .Values.paymentService.stripe.webhookSecret | quote }}
  payment-stripe-connect-webhook-secret: {{ .Values.paymentService.stripe.connectWebhookSecret | quote }}
