{{- if .Values.hydra.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-jam.fullname" . }}-hydra
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: hydra
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "open-jam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: hydra
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: hydra
    spec:
      containers:
        - name: hydra
          image: {{ .Values.hydra.image }}
          {{- if .Values.hydra.dev }}
          args: ["serve", "all", "--dev"]
          {{- else }}
          args: ["serve", "all"]
          {{- end }}
          env:
            - name: DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: hydra-dsn
            - name: URLS_SELF_ISSUER
              value: {{ include "open-jam.hydraPublicUrl" . | quote }}
            - name: URLS_LOGIN
              value: {{ printf "%slogin" .Values.config.authPageUrl | quote }}
            - name: URLS_CONSENT
              value: {{ printf "%sconsent" .Values.config.authPageUrl | quote }}
            - name: URLS_LOGOUT
              value: {{ printf "%slogout" .Values.config.authPageUrl | quote }}
            - name: URLS_ERROR
              value: {{ printf "%serror" .Values.config.authPageUrl | quote }}
            - name: SECRETS_SYSTEM
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: hydra-system-secret
            - name: OIDC_SUBJECT_IDENTIFIERS_SUPPORTED_TYPES
              value: {{ .Values.hydra.oidc.subjectIdentifiers | quote }}
            - name: OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: hydra-pairwise-salt
            - name: TTL_AUTH_CODE
              value: {{ .Values.hydra.ttl.authCode | quote }}
            - name: TTL_LOGIN_CONSENT_REQUEST
              value: {{ .Values.hydra.ttl.loginConsentRequest | quote }}
            - name: LOG_LEAK_SENSITIVE_VALUES
              value: "false"
            - name: SERVE_PUBLIC_CORS_ENABLED
              value: "true"
            - name: SERVE_PUBLIC_CORS_ALLOWED_ORIGINS
              value: {{ .Values.hydra.cors.allowedOrigins | quote }}
            - name: STRATEGIES_ACCESS_TOKEN
              value: jwt
            - name: LOG_LEVEL
              value: warn
            # 跨子網域 SSO（auth / workspace / creator / market）需要 SameSite=None 才能在 silent auth iframe 中送出 cookie
            - name: SERVE_COOKIES_SAME_SITE_MODE
              value: "None"
            {{- if not .Values.hydra.dev }}
            # GCLB 終止 TLS 後以 HTTP 轉發；需告知 Hydra 信任的來源 CIDR，使其依 X-Forwarded-Proto 正確標記 cookie 為 Secure
            - name: SERVE_TLS_ALLOW_TERMINATION_FROM
              value: {{ .Values.hydra.tlsTerminationFrom | quote }}
            {{- end }}
          ports:
            - containerPort: 4444
              name: public
            - containerPort: 4445
              name: admin
          {{- with .Values.hydra.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health/alive
              port: admin
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/alive
              port: admin
            initialDelaySeconds: 30
            periodSeconds: 15
{{- end }}
