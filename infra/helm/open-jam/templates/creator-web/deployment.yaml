{{- if .Values.creatorWeb.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-jam.fullname" . }}-creator-web
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: creator-web
spec:
  replicas: {{ .Values.creatorWeb.replicaCount }}
  selector:
    matchLabels:
      {{- include "open-jam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: creator-web
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: creator-web
    spec:
      containers:
        - name: creator-web
          image: {{ printf "%s:%s" .Values.creatorWeb.image.repository .Values.creatorWeb.image.tag | quote }}
          imagePullPolicy: {{ .Values.creatorWeb.image.pullPolicy }}
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PORTAL_PAGE_URL
              value: {{ .Values.config.externalUrl | quote }}
            - name: CATALOG_API_URL
              value: {{ .Values.config.catalogApiUrl | quote }}
            - name: STORE_API_URL
              value: {{ .Values.config.storeApiUrl | quote }}
            - name: ORDER_API_URL
              value: {{ .Values.config.orderApiUrl | quote }}
            # 多租戶以子網域 (<slug>.openjam.co) 推導店面 slug；此處留空，僅本地無子網域時的 fallback 才用得到
            - name: STORE_SLUG
              value: ""
            - name: OIDC_AUTHORITY
              value: {{ include "open-jam.hydraPublicUrl" . | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.config.oidcClientId | quote }}
            - name: AUTH_PAGE_URL
              value: {{ .Values.config.authPageUrl | quote }}
          {{- with .Values.creatorWeb.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
{{- end }}
