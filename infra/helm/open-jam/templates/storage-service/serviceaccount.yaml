{{- if and .Values.storageService.enabled (eq .Values.storage.provider "Gcs") }}
# storage-service 專屬 KSA：以 GKE Workload Identity 綁定 GSA 存取 GCS
#（signed URL 經 IAM SignBlob 簽章，免服務帳戶金鑰）。
# GSA 端的 IAM 綁定（workloadIdentityUser / serviceAccountTokenCreator / bucket 權限）
# 不由 Helm 管理，須先以 gcloud 完成（見 docs/infra.md「部署流程」）。
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "open-jam.fullname" . }}-storage-service
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-service
  annotations:
    iam.gke.io/gcp-service-account: {{ required "storage.gcs.gcpServiceAccount 必填（Provider=Gcs 走 Workload Identity）" .Values.storage.gcs.gcpServiceAccount | quote }}
{{- end }}
