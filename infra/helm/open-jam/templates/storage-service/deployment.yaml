{{- if .Values.storageService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-jam.fullname" . }}-storage-service
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-service
spec:
  replicas: {{ .Values.storageService.replicaCount }}
  selector:
    matchLabels:
      {{- include "open-jam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: storage-service
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: storage-service
    spec:
      containers:
        - name: storage-service
          image: {{ printf "%s:%s" .Values.storageService.image.repository .Values.storageService.image.tag | quote }}
          imagePullPolicy: {{ .Values.storageService.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            - name: Logging__LogLevel__Default
              value: "Warning"
            - name: Logging__LogLevel__Microsoft
              value: "Warning"
            - name: Logging__LogLevel__Microsoft.Hosting.Lifetime
              value: "Warning"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: storage-service-connection-string
            - name: RabbitMQ__Host
              value: {{ include "open-jam.rabbitmqHost" . | quote }}
            - name: RabbitMQ__Username
              value: {{ .Values.rabbitmq.user | quote }}
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: rabbitmq-password
            - name: Hydra__Issuer
              value: {{ include "open-jam.hydraPublicUrl" . | quote }}
            - name: Hydra__MetadataAddress
              value: {{ include "open-jam.hydraMetadataAddress" . | quote }}
            - name: Storage__Provider
              value: {{ .Values.storage.provider | quote }}
            - name: Storage__Endpoint
              value: {{ .Values.storage.endpoint | quote }}
            - name: Storage__AccessKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: storage-access-key
            - name: Storage__SecretKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: storage-secret-key
            - name: Storage__UseSsl
              value: {{ .Values.storage.useSsl | quote }}
            - name: Storage__Bucket
              value: {{ .Values.storage.bucket | quote }}
            - name: Storage__PublicBaseUrl
              value: {{ .Values.config.storagePublicBaseUrl | quote }}
            - name: Storage__SoftDeleteRetentionDays
              value: {{ .Values.storage.softDeleteRetentionDays | quote }}
            - name: Storage__Gcs__CredentialsPath
              value: {{ .Values.storage.gcs.credentialsPath | quote }}
          {{- with .Values.storageService.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh"]
          args:
            - -c
            - >
              /wait-for-it.sh {{ include "open-jam.postgresHost" . }}:5432 --timeout=60 --strict &&
              /wait-for-it.sh {{ include "open-jam.rabbitmqHost" . }}:5672 --timeout=60 --strict &&
              dotnet StorageService.dll
          volumeMounts:
            - name: wait-for-it
              mountPath: /wait-for-it.sh
              subPath: wait-for-it.sh
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: wait-for-it
          configMap:
            name: {{ include "open-jam.fullname" . }}-wait-for-it
            defaultMode: 0755
{{- end }}
