{{- if .Values.storageService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "open-jam.fullname" . }}-storage-service
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage-service
spec:
  replicas: {{ .Values.storageService.replicaCount }}
  # 單節點 CPU 近滿載且僅單一 replica：改用 Recreate（先停舊再起新），
  # 避免預設 RollingUpdate 的 surge 需同時容納兩份 pod 而卡在 Pending。
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "open-jam.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: storage-service
  template:
    metadata:
      labels:
        {{- include "open-jam.labels" . | nindent 8 }}
        app.kubernetes.io/component: storage-service
    spec:
      containers:
        - name: storage-service
          image: {{ printf "%s:%s" .Values.storageService.image.repository .Values.storageService.image.tag | quote }}
          imagePullPolicy: {{ .Values.storageService.image.pullPolicy }}
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_HTTP_PORTS
              value: "8080"
            # 對應 infra chart Ingress 的 path 前綴（GCE Ingress 不剝除，由服務自行剝除）
            - name: PathBase
              value: "/storage-service"
            - name: Logging__LogLevel__Default
              value: "Warning"
            - name: Logging__LogLevel__Microsoft
              value: "Warning"
            - name: Logging__LogLevel__Microsoft.Hosting.Lifetime
              value: "Warning"
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: storage-service-connection-string
            - name: RabbitMQ__Host
              value: {{ include "open-jam.rabbitmqHost" . | quote }}
            - name: RabbitMQ__Username
              value: {{ .Values.rabbitmq.user | quote }}
            - name: RabbitMQ__Password
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: rabbitmq-password
            - name: Hydra__Issuer
              value: {{ include "open-jam.hydraPublicUrl" . | quote }}
            - name: Hydra__MetadataAddress
              value: {{ include "open-jam.hydraMetadataAddress" . | quote }}
            - name: Storage__Provider
              value: {{ .Values.storage.provider | quote }}
            - name: Storage__PublicBaseUrl
              value: {{ .Values.config.storagePublicBaseUrl | quote }}
            - name: Storage__SoftDeleteRetentionDays
              value: {{ .Values.storage.softDeleteRetentionDays | quote }}
            {{- if eq .Values.storage.provider "Gcs" }}
            - name: Storage__PublicBucket
              value: {{ .Values.storage.publicBucket | quote }}
            - name: Storage__PrivateBucket
              value: {{ .Values.storage.privateBucket | quote }}
            {{- if .Values.storage.gcs.credentialsSecretName }}
            - name: Storage__Gcs__CredentialsPath
              value: {{ printf "%s/%s" (.Values.storage.gcs.mountPath | trimSuffix "/") .Values.storage.gcs.credentialsSecretKey | quote }}
            {{- else }}
            - name: Storage__Gcs__CredentialsPath
              value: {{ .Values.storage.gcs.credentialsPath | quote }}
            {{- end }}
            {{- else }}
            - name: Storage__Local__RootPath
              value: {{ .Values.storage.local.rootPath | quote }}
            - name: Storage__Local__BaseUrl
              value: {{ .Values.storage.local.baseUrl | quote }}
            - name: Storage__Local__SigningKey
              valueFrom:
                secretKeyRef:
                  name: {{ include "open-jam.secretName" . }}
                  key: storage-local-signing-key
            {{- end }}
          {{- with .Values.storageService.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/bin/sh"]
          args:
            - -c
            - >
              /wait-for-it.sh {{ include "open-jam.postgresHost" . }}:5432 --timeout=60 --strict &&
              /wait-for-it.sh {{ include "open-jam.rabbitmqHost" . }}:5672 --timeout=60 --strict &&
              dotnet StorageService.dll
          volumeMounts:
            - name: wait-for-it
              mountPath: /wait-for-it.sh
              subPath: wait-for-it.sh
            {{- if and (eq .Values.storage.provider "Gcs") .Values.storage.gcs.credentialsSecretName }}
            - name: gcs-sa-key
              mountPath: {{ .Values.storage.gcs.mountPath | quote }}
              readOnly: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: wait-for-it
          configMap:
            name: {{ include "open-jam.fullname" . }}-wait-for-it
            defaultMode: 0755
        {{- if and (eq .Values.storage.provider "Gcs") .Values.storage.gcs.credentialsSecretName }}
        - name: gcs-sa-key
          secret:
            secretName: {{ .Values.storage.gcs.credentialsSecretName | quote }}
            # 容器以非 root 使用者（Dockerfile 的 $APP_UID，UID 1654）執行，
            # secret 檔案 owner 為 root；0400 只有 owner 可讀會導致 Permission denied。
            # secret volume 僅掛載於本 pod，pod 內全域可讀（0444）不構成外洩。
            defaultMode: 0444
        {{- end }}
{{- end }}
