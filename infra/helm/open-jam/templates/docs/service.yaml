{{- if .Values.docs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "open-jam.fullname" . }}-docs
  labels:
    {{- include "open-jam.labels" . | nindent 4 }}
    app.kubernetes.io/component: docs
spec:
  ports:
    - port: 80
      targetPort: http
      name: http
  selector:
    {{- include "open-jam.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: docs
{{- end }}
