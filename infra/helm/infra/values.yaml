nameOverride: ""
fullnameOverride: ""

# ── Ingress（GKE）────────────────────────────────────────────────────────────
# 以 GKE 原生 Ingress（GCE Ingress Controller）做 host 路由，
# wildcard `*.openjam.co`（除已列出的固定子網域外）導向 creator-web。
#
# 注意：Ingress 的 backend Service 須與 Ingress 同 namespace，且本 chart 與
# open-jam 應用 chart 為各自獨立的 release，因此以下直接填入「open-jam chart
# 實際建立的 Service 名稱」（預設對應 release name = open-jam 的命名慣例：
# <release>-<component>）。若 release 名稱不同，請對應調整。
# `api.openjam.co` 對應 docs/infra.md 所述「功能 API」服務，目前以 path 路由
# 逐步對應各微服務（如 `/store-service` → StoreService、`/log-service` →
# LogService）；其餘 path（如 storage-service）待對應服務的 Helm chart /
# Service 就緒（storageService.enabled=true）後再依需求新增。
# 注意：GCE Ingress 的 translation 為 all-or-nothing —— 任一 path 指向不存在的
# Service 會使「整個」Ingress 同步失敗，連帶讓 api.openjam.co 所有路由都無法寫入
# URL map（請求將掉進 *.openjam.co 萬用網域）。新增 path 前務必確認 Service 已部署。

ingress:
  enabled: false
  className: gce
  # GKE 全域靜態 IP 名稱（gcloud compute addresses create ... --global）
  staticIpName: ""
  annotations: {}
  tls:
    # cert-manager 簽發的 wildcard 憑證會寫入此 Secret（需與 certManager.dnsNames 對應）
    secretName: open-jam-tls
  hosts:
    - host: openjam.co
      serviceName: open-jam-portal-web
    - host: auth.openjam.co
      serviceName: open-jam-auth
    - host: hydra.openjam.co
      serviceName: open-jam-hydra
      servicePort: public
    - host: workspace.openjam.co
      serviceName: open-jam-workspace-web
    - host: api.openjam.co
      paths:
        - path: /auth-service
          serviceName: open-jam-auth
        - path: /store-service
          serviceName: open-jam-store-service
        - path: /catalog-service
          serviceName: open-jam-catalog-service
        - path: /log-service
          serviceName: open-jam-log-service
        - path: /content-service
          serviceName: open-jam-content-service
        - path: /payment-service
          serviceName: open-jam-payment-service
        - path: /order-service
          serviceName: open-jam-order-service
        - path: /notification-service
          serviceName: open-jam-notification-service
    - host: docs.openjam.co
      serviceName: open-jam-docs
    - host: "*.openjam.co"
      serviceName: open-jam-creator-web

# ── TLS 憑證（cert-manager + Let's Encrypt）───────────────────────────────────
# 透過 Cloudflare DNS-01 challenge 簽發 / 續期 wildcard 憑證，涵蓋所有子網域。
#
# 前置需求：
#   - 叢集已安裝 cert-manager（含 CRDs）
#   - 已建立內含 Cloudflare API Token 的 Secret（見 cloudflare.apiTokenSecretName，
#     建議由 External Secrets Operator 從 GCP Secret Manager 同步，避免明文進 git）
#
# 注意：ClusterIssuer 為叢集級資源（非 namespaced）；Certificate 為 namespaced
# 資源，會與本 chart（Ingress）部署於同一 release namespace（helm install -n ...），
# 確保與 TLS Secret / Ingress 對齊。

certManager:
  enabled: false
  acmeServer: https://acme-v02.api.letsencrypt.org/directory
  email: ""
  clusterIssuerName: letsencrypt-cloudflare
  dnsZone: openjam.co
  dnsNames:
    - openjam.co
    - "*.openjam.co"
  cloudflare:
    apiTokenSecretName: cloudflare-api-token
    apiTokenSecretKey: api-token
