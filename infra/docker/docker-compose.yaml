name: ${PROJECT_NAME}

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    container_name: ${PROJECT_NAME}-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./volumes/postgres/data:/var/lib/postgresql/data
      - ./volumes/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    container_name: ${PROJECT_NAME}-redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  rabbitmq:
    container_name: ${PROJECT_NAME}-rabbitmq
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
    volumes:
      - ./volumes/rabbitmq/data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  hydra-migrate:
    container_name: ${PROJECT_NAME}-hydra-migrate
    image: oryd/hydra:v2.2
    command: migrate sql --yes ${HYDRA_DSN}?sslmode=disable
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy

  hydra:
    container_name: ${PROJECT_NAME}-hydra
    image: oryd/hydra:v2.2
    command: serve all --dev
    restart: unless-stopped
    environment:
      DSN: ${HYDRA_DSN}?sslmode=disable
      URLS_SELF_ISSUER: ${HYDRA_URLS_SELF_ISSUER}
      URLS_CONSENT: ${HYDRA_URLS_CONSENT}
      URLS_LOGIN: ${HYDRA_URLS_LOGIN}
      URLS_LOGOUT: ${HYDRA_URLS_LOGOUT}
      URLS_ERROR: ${HYDRA_URLS_ERROR}
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM}
      OIDC_SUBJECT_IDENTIFIERS_SUPPORTED_TYPES: ${HYDRA_OIDC_SUBJECT_IDENTIFIERS_SUPPORTED_TYPES}
      OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT: ${HYDRA_OIDC_SUBJECT_IDENTIFIERS_PAIRWISE_SALT}
      TTL_AUTH_CODE: ${HYDRA_TTL_AUTH_CODE}
      TTL_LOGIN_CONSENT_REQUEST: ${HYDRA_TTL_LOGIN_CONSENT_REQUEST}
      LOG_LEAK_SENSITIVE_VALUES: ${HYDRA_LOG_LEAK_SENSITIVE_VALUES}
      SERVE_PUBLIC_CORS_ALLOWED_ORIGINS: ${HYDRA_SERVE_PUBLIC_CORS_ALLOWED_ORIGINS}
      STRATEGIES_ACCESS_TOKEN: jwt
      LOG_LEVEL: info
    ports:
      - "${HYDRA_PUBLIC_PORT}:4444"
      - "${HYDRA_ADMIN_PORT}:4445"
    depends_on:
      postgres:
        condition: service_healthy
      hydra-migrate:
        condition: service_completed_successfully

  mailpit:
    container_name: ${PROJECT_NAME}-mailpit
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI

  # ── Application Services ────────────────────────────────────────────────────

  auth:
    container_name: ${PROJECT_NAME}-auth
    build:
      context: ../../src
      dockerfile: Auth/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: ${AUTH__CONNECTION_STRING}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Hydra__AdminUrl: ${HYDRA_ADMIN_URL}
      App__BaseUrl: ${AUTH_PAGE_URL}
      App__WorkspaceUrl: ${WORKSPACE_URL}
      App__MarketUrl: ${MARKET_PAGE_URL}
    ports:
      - "5169:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hydra:
        condition: service_started

  log-service:
    container_name: ${PROJECT_NAME}-log-service
    build:
      context: ../../src
      dockerfile: LogService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_log;Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Hydra__Issuer: ${HYDRA_PUBLIC_URL}
      Hydra__MetadataAddress: ${HYDRA_INTERNAL_URL}
    ports:
      - "5170:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hydra:
        condition: service_started

  email-service:
    container_name: ${PROJECT_NAME}-email-service
    build:
      context: ../../src
      dockerfile: EmailService/Dockerfile
    restart: unless-stopped
    environment:
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_email;Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__UseSsl: ${SMTP_ENABLE_SSL}
      Smtp__FromAddress: ${SMTP_FROM}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mailpit:
        condition: service_started

  storage-service:
    container_name: ${PROJECT_NAME}-storage-service
    build:
      context: ../../src
      dockerfile: StorageService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_storage;Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Storage__Provider: ${STORAGE_PROVIDER}
      Storage__Bucket: ${STORAGE_BUCKET}
      Storage__PublicBaseUrl: ${STORAGE_PUBLIC_BASE_URL}
      Storage__Local__RootPath: ${STORAGE_LOCAL_ROOT_PATH}
      Storage__Local__BaseUrl: ${STORAGE_LOCAL_BASE_URL}
      Storage__Local__SigningKey: ${STORAGE_LOCAL_SIGNING_KEY}
      Hydra__Issuer: ${HYDRA_PUBLIC_URL}
      Hydra__MetadataAddress: ${HYDRA_INTERNAL_URL}
    ports:
      - "5171:8080"
    volumes:
      - ./volumes/storage/files:/app/${STORAGE_LOCAL_ROOT_PATH}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hydra:
        condition: service_started

  store-service:
    container_name: ${PROJECT_NAME}-store-service
    build:
      context: ../../src
      dockerfile: StoreService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_store;Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Storage__PublicBaseUrl: ${STORAGE_PUBLIC_BASE_URL}
      Services__StorageService__BaseUrl: http://${PROJECT_NAME}-storage-service:8080
      Hydra__Issuer: ${HYDRA_PUBLIC_URL}
      Hydra__MetadataAddress: ${HYDRA_INTERNAL_URL}
    ports:
      - "5172:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hydra:
        condition: service_started
      storage-service:
        condition: service_started

  quota-service:
    container_name: ${PROJECT_NAME}-quota-service
    build:
      context: ../../src
      dockerfile: QuotaService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_quota;Username=${DB_USER};Password=${DB_PASSWORD}
      Services__StorageService__BaseUrl: http://${PROJECT_NAME}-storage-service:8080
      Hydra__Issuer: ${HYDRA_PUBLIC_URL}
      Hydra__MetadataAddress: ${HYDRA_INTERNAL_URL}
    ports:
      - "5177:8080"
    depends_on:
      postgres:
        condition: service_healthy
      hydra:
        condition: service_started
      storage-service:
        condition: service_started

  payment-service:
    container_name: ${PROJECT_NAME}-payment-service
    build:
      context: ../../src
      dockerfile: PaymentService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_payment;Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      Stripe__PublishableKey: ${STRIPE_PUBLISHABLE_KEY}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET}
      Stripe__SuccessUrl: ${PAYMENT_SUCCESS_URL}
      Stripe__CancelUrl: ${PAYMENT_CANCEL_URL}
      ServiceAuth__ClientId: ${HYDRA_SERVICE_CLIENT_ID:-open-jam-service}
      Hydra__Issuer: ${HYDRA_PUBLIC_URL}
      Hydra__MetadataAddress: ${HYDRA_INTERNAL_URL}
    ports:
      - "5178:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hydra:
        condition: service_started

  order-service:
    container_name: ${PROJECT_NAME}-order-service
    build:
      context: ../../src
      dockerfile: OrderService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_order;Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Services__StoreService__BaseUrl: http://${PROJECT_NAME}-store-service:8080
      Services__PaymentService__BaseUrl: http://${PROJECT_NAME}-payment-service:8080
      ServiceAuth__TokenUrl: http://${PROJECT_NAME}-hydra:4444/oauth2/token
      ServiceAuth__ClientId: ${HYDRA_SERVICE_CLIENT_ID:-open-jam-service}
      ServiceAuth__ClientSecret: ${HYDRA_SERVICE_CLIENT_SECRET:-change-me-in-production}
      Hydra__Issuer: ${HYDRA_PUBLIC_URL}
      Hydra__MetadataAddress: ${HYDRA_INTERNAL_URL}
    ports:
      - "5179:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hydra:
        condition: service_started
      store-service:
        condition: service_started
      payment-service:
        condition: service_started

  notification-service:
    container_name: ${PROJECT_NAME}-notification-service
    build:
      context: ../../src
      dockerfile: NotificationService/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_notification;Username=${DB_USER};Password=${DB_PASSWORD}
      RabbitMQ__Host: ${RABBITMQ_HOST}
      RabbitMQ__Username: ${RABBITMQ_USER}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      Services__StoreService__BaseUrl: http://${PROJECT_NAME}-store-service:8080
      Notification__CatalogUrlPattern: ${NOTIFICATION_CATALOG_URL_PATTERN}
      Hydra__Issuer: ${HYDRA_PUBLIC_URL}
      Hydra__MetadataAddress: ${HYDRA_INTERNAL_URL}
    ports:
      - "5180:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      hydra:
        condition: service_started
      store-service:
        condition: service_started

  creator-web:
    container_name: ${PROJECT_NAME}-creator-web
    build:
      context: ../../apps/creator-web
    restart: unless-stopped
    environment:
      MARKET_PAGE_URL: ${MARKET_PAGE_URL}
      CATALOG_API_URL: ${CATALOG_API_URL}
      STORE_API_URL: ${STORE_API_URL}
      STORE_SLUG: ${STORE_SLUG}
      OIDC_AUTHORITY: ${AUTHORITY}
      OIDC_CLIENT_ID: ${WEB_CLIENT_ID}
      AUTH_PAGE_URL: ${AUTH_PAGE_URL}
    ports:
      - "5173:80"

  portal-web:
    container_name: ${PROJECT_NAME}-portal-web
    build:
      context: ../../apps/portal-web
    restart: unless-stopped
    environment:
      WORKSPACE_PAGE_URL: ${WORKSPACE_URL}
      CREATOR_PAGE_BASE_URL: ${CREATOR_BASE_URL}
      OIDC_AUTHORITY: ${AUTHORITY}
      OIDC_CLIENT_ID: ${WEB_CLIENT_ID}
      AUTH_PAGE_URL: ${AUTH_PAGE_URL}
      GITHUB_REPO_URL: ${GITHUB_REPO_URL}
      DOCS_URL: ${DOCS_URL}
      CATALOG_API_URL: ${CATALOG_API_URL}
      STORE_API_URL: ${STORE_API_URL}
    ports:
      - "5174:80"

  workspace-web:
    container_name: ${PROJECT_NAME}-workspace-web
    build:
      context: ../../apps/workspace-web
    restart: unless-stopped
    environment:
      WORKSPACE_PAGE_URL: ${WORKSPACE_URL}
      MARKET_PAGE_URL: ${MARKET_PAGE_URL}
      OIDC_AUTHORITY: ${AUTHORITY}
      OIDC_CLIENT_ID: ${WEB_CLIENT_ID}
      AUTH_PAGE_URL: ${AUTH_PAGE_URL}
      STORE_API_URL: ${STORE_API_URL}
      CATALOG_API_URL: ${CATALOG_API_URL}
      LOG_API_URL: ${LOG_API_URL}
    ports:
      - "5175:80"

  docs:
    container_name: ${PROJECT_NAME}-docs
    build:
      context: ../../docs
    restart: unless-stopped
    ports:
      - "5176:80"

  bootstrap:
    container_name: ${PROJECT_NAME}-bootstrap
    build:
      context: ../../src
      dockerfile: Bootstrap/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: Host=${DB_HOST};Database=${DB_NAME_PREFIX}_email;Username=${DB_USER};Password=${DB_PASSWORD}
      Hydra__AdminUrl: ${HYDRA_ADMIN_URL}
      HydraClients__Service__ClientId: ${HYDRA_SERVICE_CLIENT_ID:-open-jam-service}
      HydraClients__Service__ClientSecret: ${HYDRA_SERVICE_CLIENT_SECRET:-change-me-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      hydra:
        condition: service_started
    restart: "no"
    profiles:
      - seed
