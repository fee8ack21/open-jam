# App-of-Apps 根 Application（bootstrap 用，手動 apply 一次）
#
#   kubectl apply -n argocd -f infra/argocd/root.yaml
#
# 此 Application 只負責「同步 infra/argocd/apps/ 底下的子 Application 清單」，
# 各子 Application 再各自指向對應的 Helm chart。之後新增服務 / 環境只要在
# apps/ 下多放一個 Application YAML 並 commit，root 會自動納管（自我繁殖）。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-jam-root
  namespace: argocd
  # 避免 root 被自己 prune 掉
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fee8ack21/open-jam
    targetRevision: main
    path: infra/argocd/apps
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
