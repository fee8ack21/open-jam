# 應用層 chart（全部微服務 + postgres / redis / rabbitmq / hydra / bootstrap）。
#
# ⚠️ Application 名稱必須是 "open-jam"：ArgoCD 預設以 Application 名作為 Helm
#    release name，而 infra chart 的 Ingress 硬寫了 "open-jam-<component>" 的
#    Service 名稱。改名會導致 Ingress 指向不存在的 Service。
#
# sync-wave 1：早於 infra（wave 2），確保 Service 先存在，GCE Ingress 才寫得進
# URL map（GCE Ingress translation 為 all-or-nothing）。
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-jam
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/fee8ack21/open-jam
    targetRevision: main
    path: infra/helm/open-jam
    helm:
      valueFiles:
        - values.prod.yaml
      # ── 敏感值不放 git ──
      # values.prod.yaml 內的 secrets.* 明文請改由 External Secrets Operator
      # 從 GCP Secret Manager 同步成 K8s Secret，chart 端改讀既有 Secret。
      # 過渡期若仍需 --set，可用 ArgoCD 的 valuesObject 或 plugin，勿把密碼寫回 git。
  destination:
    server: https://kubernetes.default.svc
    namespace: open-jam
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
